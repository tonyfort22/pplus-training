appId: host.exp.Exponent
---
- stopApp
- openLink: exp://127.0.0.1:8084
- extendedWaitUntil:
    visible: "Viewing athlete"
    timeout: 60000
- assertVisible: "Mia Chen"
- extendedWaitUntil:
    visible: "Start Workout"
    timeout: 10000
- tapOn: "Start Workout"
- extendedWaitUntil:
    visible: "Safe Simulator Workout"
    timeout: 15000
- assertVisible: "Safe Simulator Workout"
- assertVisible: "Barbell Back Squat"
- tapOn:
    id: "active-workout-set-1-load-input"
- eraseText
- inputText: "105"
- tapOn:
    id: "active-workout-set-1-reps-input"
- eraseText
- inputText: "6"
- tapOn:
    id: "active-workout-set-1-done-button"
- assertVisible:
    id: "active-workout-set-1-done-button"
