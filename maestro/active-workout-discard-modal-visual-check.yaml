appId: host.exp.Exponent
---
- stopApp
- openLink: exp://127.0.0.1:8084
- extendedWaitUntil:
    visible: "Viewing athlete"
    timeout: 60000
- assertVisible: "Mia Chen"
- extendedWaitUntil:
    visible: "Start Workout"
    timeout: 10000
- tapOn: "Start Workout"
- extendedWaitUntil:
    visible: "Safe Simulator Workout"
    timeout: 15000
- assertVisible: "Barbell Back Squat"
- scrollUntilVisible:
    element: "Discard Workout"
    direction: DOWN
- tapOn: "Discard Workout"
- extendedWaitUntil:
    visible: "Are you sure you want to discard this workout? This action cannot be undone."
    timeout: 10000
- assertVisible:
    id: "active-workout-discard-workout-modal"
- assertVisible: "Discard Workout"
- assertVisible: "Discard"
- assertVisible: "Cancel"
