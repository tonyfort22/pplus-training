appId: host.exp.Exponent
---
- stopApp
- openLink: exp://127.0.0.1:8084
- extendedWaitUntil:
    visible: "Viewing athlete"
    timeout: 60000
- assertVisible: "Mia Chen"
- extendedWaitUntil:
    visible: "Safe Simulator Workout"
    timeout: 10000
- tapOn: "Open workout"
- extendedWaitUntil:
    visible: "Start Workout"
    timeout: 10000
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- tapOn:
    id: "workout-edit-name-input"
- eraseText
- inputText: "Safe Edited Workout"
- tapOn:
    id: "workout-edit-notes-input"
- eraseText
- inputText: "Saved only after explicit Save"
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Safe Simulator Workout"
    timeout: 10000
- assertNotVisible: "Safe Edited Workout"
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- tapOn:
    id: "workout-edit-name-input"
- eraseText
- inputText: "Safe Edited Workout"
- tapOn:
    id: "workout-edit-notes-input"
- eraseText
- inputText: "Saved only after explicit Save"
- tapOn:
    id: "workout-edit-save-button"
- extendedWaitUntil:
    visible: "Safe Edited Workout"
    timeout: 10000
- assertVisible: "Safe Edited Workout"
